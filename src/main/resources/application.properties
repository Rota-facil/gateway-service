spring.application.name=gateway-service
server.port=8080

# EUREKA
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8081/eureka}
eureka.client.fetch-registry=true


# RABBIMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:rota-facil}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin}

# RABBITMQ AUTH
rabbitmq.auth.exchange=${RABBITMQ_AUTH_EXCHANGE:auth.events}
# queues
rabbitmq.gateway.user.deleted.queue=${RABBITMQ_GATEWAY_USER_DELETED_QUEUE:gateway.user.deleted.queue}
rabbitmq.gateway.user.email.changed.queue=${RABBITMQ_GATEWAY_USER_EMAIL_CHANGED_QUEUE:gateway.user.email.changed.queue}
# routing keys
rabbitmq.user.deleted.routing.key=${RABBITMQ_USER_DELETED_ROUTING_KEY:user.deleted}
rabbitmq.user.email.changed.routing.key=${RABBITMQ_USER_EMAIL_CHANGED_ROUTING_KEY:user.email.changed}


# REDIS
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:admin}


# SECURITY
security.public.key=${PUBLIC_KEY:}


# OBSERVABILITY
# trancing
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

# metrics
management.otlp.metrics.export.enabled=true

# collector endpoint
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
management.otlp.metrics.export.url=http://localhost:4318/v1/metrics
logging.level.io.micrometer.tracing=DEBUG
logging.level.org.springframework.cloud.sleuth=DEBUG


# logs
logging.file.name=logs/gateway.log